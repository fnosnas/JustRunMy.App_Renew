name: JustRunMy 自动续期

on:
  workflow_dispatch:
  schedule:
    # 每 6 小时检查一次（用于触发判断）
    - cron: '0 */6 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          STATE_FILE="last_run.txt"

          NOW=$(date +%s)

          # 如果没有记录文件，第一次直接运行
          if [ ! -f "$STATE_FILE" ]; then
            echo "首次运行"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_RUN=$(cat $STATE_FILE)

          # 生成随机间隔（40~48小时，单位秒）
          MIN=$((40*3600))
          MAX=$((48*3600))
          RANDOM_DELAY=$(( MIN + RANDOM % (MAX - MIN) ))

          NEXT_RUN=$(( LAST_RUN + RANDOM_DELAY ))

          echo "上次运行: $LAST_RUN"
          echo "当前时间: $NOW"
          echo "目标间隔: $RANDOM_DELAY 秒"

          if [ $NOW -ge $NEXT_RUN ]; then
            echo "达到随机时间，执行续期"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "未到时间，跳过"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - id: set-matrix
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 启动代理 (可选)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then echo "直连模式"; exit 0; fi
          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          python proxy_handler.py
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3

      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 随机延迟 (防风控)
        run: |
          RANDOM_DELAY=$(( RANDOM % 1200 ))
          echo "延迟 $RANDOM_DELAY 秒..."
          sleep $RANDOM_DELAY

      - name: 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py

      - name: 记录执行时间
        run: |
          date +%s > last_run.txt

      - name: 提交状态
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_run.txt
          git commit -m "update last run time" || exit 0
          git push

      - name: 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
