name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    # 每 12 小时检查一次（北京时间 0点和12点左右）
    # 这样可以确保在 48 小时窗口内一定能捕捉到执行机会
    - cron: '0 */12 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check-time.outputs.should_run }}
    steps:
      - id: check-time
        shell: bash
        run: |
          # 1. 如果是手动触发，100% 运行
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. 自动触发逻辑：利用日期判断
          # 获取当前是这一年的第几天
          DOY=$(date +%j)
          # 获取当前小时
          HOUR=$(date +%H)

          # 每 2 天运行一次 (当日期是偶数天，且在 0点-12点这个区间触发时)
          # 这样能保证每 48 小时必定触发一次，且时间不固定（受 GitHub 调度延迟影响）
          if [ $((10#$DOY % 2)) -eq 0 ] && [ $HOUR -lt 13 ]; then
            echo "符合 48 小时周期，准备运行续期..."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "未到 48 小时周期，跳过。下次 12 小时后会再次检查。"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - id: set-matrix
        if: steps.check-time.outputs.should_run == 'true'
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 启动代理 (可选)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then echo "直连模式"; exit 0; fi
          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          python proxy_handler.py
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3

      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 随机延迟 (防风控)
        run: |
          # 随机延迟 0-20 分钟，增加随机性
          RANDOM_DELAY=$(( RANDOM % 1200 ))
          echo "延迟 $RANDOM_DELAY 秒..."
          sleep $RANDOM_DELAY

      - name: 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py

      - name: 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
